{% set version = environ.get('PYMETEO_VERSION', '0.0.0') %}

package:
  name: pymeteo
  version: "{{ version }}"

build:
  noarch: python
  number: 0
  script: python -m pip install --no-deps --no-build-isolation ..

source:
  path: ..

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68.0

  run:
    - python >=3.10
    - numpy >=1.23
    - matplotlib >=3.5

about:
  home: https://github.com/cwebster2/pyMeteo
  license: BSD-3-Clause
  license_file: LICENSE
  summary: General meteorological routines, skew-T/log-p plotting and working with CM1 model data.

extra:
  maintainers:
    - Casey Webster <casey@wxster.com>
